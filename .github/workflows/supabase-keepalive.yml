name: Supabase Keep-Alive
on:
  schedule:
    - cron: '0 8 * * 1,4'  # Montag + Donnerstag, 8 Uhr UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "https://oihgrdxnukljmkfhstzs.supabase.co/rest/v1/request_counts?select=count&limit=1"
          echo "Ping erfolgreich!"
