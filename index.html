<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilanz-Bert – Gleich zurück!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1923;
      --card: #1a2736;
      --accent: #f5a623;
      --accent2: #4ecdc4;
      --text: #e8f0f7;
      --muted: #7a9ab8;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated background dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(245,166,35,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      animation: drift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to   { background-position: 32px 32px; }
    }

    .card {
      background: var(--card);
      border: 2px solid rgba(245,166,35,0.2);
      border-radius: 24px;
      padding: 3rem 3.5rem;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .bert-wrap {
      width: 110px;
      height: 110px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: rgba(245,166,35,0.12);
      border: 3px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      animation: wobble 3s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-3deg); }
      50%       { transform: rotate(3deg); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 0.4rem;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .message {
      background: rgba(78,205,196,0.08);
      border-left: 4px solid var(--accent2);
      border-radius: 0 12px 12px 0;
      padding: 1rem 1.2rem;
      text-align: left;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      color: var(--text);
    }

    .message strong {
      color: var(--accent2);
    }

    .tools {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .tool {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      animation: pulse 2s ease-in-out infinite;
    }

    .tool:nth-child(2) { animation-delay: 0.3s; }
    .tool:nth-child(3) { animation-delay: 0.6s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; border-color: rgba(245,166,35,0.4); }
    }

    .footer {
      font-size: 0.78rem;
      color: rgba(122,154,184,0.5);
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="bert-wrap">🔧</div>
    <h1>Gleich wieder da!</h1>
    <p class="subtitle">Bilanz-Bert wird gerade verbessert</p>

    <div class="message">
      Hallo! Ich bin kurz offline für ein <strong>Update</strong>. 
      Bis zum nächsten Unterricht bin ich wieder für euch da – 
      mit noch besseren Erklärungen! 😊
    </div>

    <div class="tools">
      <span class="tool">⚙️ wird aktualisiert</span>
      <span class="tool">✨ neue Inhalte</span>
      <span class="tool">🚀 bald verfügbar</span>
    </div>

    <div class="footer">© GALS · Bilanz-Bert</div>
  </div>
</body>
</html>
