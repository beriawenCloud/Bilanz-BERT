<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PV-Paul – Der Personalverrechnungs-Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* =============================================================
       CSS VARIABLEN – hier zentral alle Farben und Abstände
    ============================================================= */
    :root {
      --bg:           #0b1426;
      --surface:      #131f35;
      --surface2:     #1a2845;
      --border:       #263b5e;
      --border-light: #2f4a75;
      --accent:       #f59e0b;       /* Gold/Amber */
      --accent-glow:  rgba(245,158,11,0.20);
      --accent-dim:   rgba(245,158,11,0.12);
      --success:      #10b981;
      --success-dim:  rgba(16,185,129,0.12);
      --error:        #ef4444;
      --error-dim:    rgba(239,68,68,0.12);
      --warning:      #f97316;
      --warn-dim:     rgba(249,115,22,0.12);
      --info:         #818cf8;
      --info-dim:     rgba(129,140,248,0.12);
      --text:         #e8eef7;
      --text-dim:     #8fa3c0;
      --text-muted:   #516078;
      --font:         'Figtree', sans-serif;
      --mono:         'JetBrains Mono', monospace;
      --radius:       14px;
      --radius-sm:    8px;
    }

    /* =============================================================
       RESET & BODY
    ============================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      /* Dezenter Hintergrundverlauf für Atmosphäre */
      background-image:
        radial-gradient(ellipse 60% 40% at 15% 0%, rgba(245,158,11,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 100%, rgba(16,185,129,0.05) 0%, transparent 60%);
    }

    /* =============================================================
       LAYOUT WRAPPER
    ============================================================= */
    .wrapper {
      max-width: 1060px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* =============================================================
       HEADER
    ============================================================= */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding: 28px 0 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Animiertes Icon */
    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 24px rgba(245,158,11,0.35), 0 4px 12px rgba(0,0,0,0.4);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 24px rgba(245,158,11,0.35), 0 4px 12px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 0 36px rgba(245,158,11,0.55), 0 4px 12px rgba(0,0,0,0.4); }
    }

    .logo-text h1 {
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo-text h1 span { color: var(--accent); }

    .logo-text p {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* Punkteanzeige */
    .points-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 22px;
      transition: transform 0.15s;
    }

    .points-badge .icon { font-size: 1.1rem; }
    .points-badge .num {
      font-family: var(--mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 36px;
      transition: all 0.3s;
    }
    .points-badge .label {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    .points-badge.bump {
      animation: bump 0.3s ease;
    }
    @keyframes bump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* =============================================================
       MODUS-TABS
    ============================================================= */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px;
      gap: 4px;
      margin: 24px 0;
      width: fit-content;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.1px;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #1a0a00;
    }

    .tab-btn:hover:not(.active) {
      background: var(--surface2);
      color: var(--text);
    }

    /* =============================================================
       KARTEN (allgemein)
    ============================================================= */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }

    .card-label {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* =============================================================
       MITARBEITER-KARTE
    ============================================================= */
    .employee-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .employee-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .employee-avatar {
      width: 42px;
      height: 42px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .employee-name {
      font-size: 1.05rem;
      font-weight: 800;
    }

    .employee-month {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .employee-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .data-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
    }

    .data-chip .chip-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .data-chip .chip-value {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      margin-top: 3px;
    }

    .data-chip .chip-value.normal {
      font-family: var(--font);
      font-size: 0.88rem;
      color: var(--text);
    }

    /* =============================================================
       FORTSCHRITTSLEISTE
    ============================================================= */
    .progress-track {
      background: var(--surface2);
      height: 5px;
      border-radius: 99px;
      margin-bottom: 22px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* =============================================================
       SCHRITT-KARTEN (Rechentrainer)
    ============================================================= */
    .step {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .step.active {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .step.done {
      border-color: var(--success);
    }

    .step.locked {
      opacity: 0.45;
      pointer-events: none;
    }

    /* Schritt-Kopfzeile */
    .step-head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
    }

    .step-num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }

    .step.active .step-num { background: var(--accent); color: #1a0a00; }
    .step.done  .step-num  { background: var(--success); color: #001a10; font-size: 1rem; }

    .step-head-info { flex: 1; }
    .step-title { font-weight: 700; font-size: 0.95rem; }
    .step-result-value {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--success);
    }

    /* Versuchs-Punkte */
    .attempt-dots {
      display: flex;
      gap: 5px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }
    .dot.used { background: var(--error); }

    /* Schritt-Inhalt */
    .step-body {
      padding: 0 20px 20px;
      display: none;
    }
    .step.active .step-body { display: block; }

    .step-desc {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 12px 16px;
      font-size: 0.87rem;
      color: var(--text-dim);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    /* Eingabezeile */
    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .input-label {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    input[type="number"] {
      flex: 1;
      min-width: 160px;
      max-width: 280px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus        { border-color: var(--accent); }
    input[type="number"].inp-correct  { border-color: var(--success); background: var(--success-dim); }
    input[type="number"].inp-wrong    { border-color: var(--error); background: var(--error-dim); }

    .input-unit { font-family: var(--mono); font-weight: 700; color: var(--text-dim); }

    /* Aktions-Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary   { background: var(--accent); color: #1a0a00; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); }

    .btn-green  { background: var(--success); color: #001a10; }
    .btn-green:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .btn-sm { padding: 7px 14px; font-size: 0.8rem; }

    /* =============================================================
       FEEDBACK-BOXEN
    ============================================================= */
    .feedback {
      display: none;
      margin-top: 12px;
      padding: 11px 15px;
      border-radius: var(--radius-sm);
      font-size: 0.87rem;
      line-height: 1.6;
      animation: fadein 0.2s ease;
    }
    @keyframes fadein { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    .feedback.show      { display: block; }
    .feedback.f-hint    { background: var(--warn-dim); border-left: 3px solid var(--warning); color: #fed7aa; }
    .feedback.f-ok      { background: var(--success-dim); border-left: 3px solid var(--success); color: #6ee7b7; }
    .feedback.f-sol     { background: var(--info-dim); border-left: 3px solid var(--info); color: #c7d2fe; }
    .feedback.f-err     { background: var(--error-dim); border-left: 3px solid var(--error); color: #fca5a5; }

    /* =============================================================
       ABSCHLUSS-KARTE
    ============================================================= */
    .completion-card {
      background: var(--success-dim);
      border: 1.5px solid var(--success);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      animation: fadein 0.4s ease;
    }
    .completion-card .big-emoji { font-size: 2.5rem; margin-bottom: 10px; }
    .completion-card h3 { font-size: 1.15rem; color: var(--success); margin-bottom: 8px; }
    .completion-card p  { color: var(--text-dim); font-size: 0.9rem; }
    .completion-card .net-amount {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      margin: 10px 0;
    }

    /* =============================================================
       TOP-AKTIONSLEISTE
    ============================================================= */
    .top-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .top-bar-title { font-size: 1.05rem; font-weight: 800; }
    .top-bar-sub   { font-size: 0.82rem; color: var(--text-dim); margin-top: 3px; }

    /* =============================================================
       FEHLERDIAGNOSE – LOHNZETTEL
    ============================================================= */
    .payslip {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 18px;
    }

    .payslip-top {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 16px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .payslip-top h3 { font-size: 0.98rem; font-weight: 800; }
    .payslip-top p  { font-size: 0.78rem; color: var(--text-dim); }

    .payslip-body { padding: 16px 20px; }

    .payslip-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }

    /* Lohnzettel-Zeile: anklickbar */
    .pz-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      cursor: pointer;
      transition: background 0.15s, border 0.15s;
      border: 1.5px solid transparent;
      font-size: 0.88rem;
      gap: 12px;
    }

    .pz-row:hover { background: rgba(255,255,255,0.04); }

    .pz-row .pz-label { flex: 1; }
    .pz-row .pz-amount {
      font-family: var(--mono);
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    .pz-row.selected {
      background: var(--error-dim);
      border-color: var(--error);
    }

    .pz-row.revealed-error {
      background: var(--error-dim);
      border-color: var(--error);
    }

    .pz-row.revealed-correct {
      background: var(--success-dim);
      border-color: var(--success);
    }

    .pz-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

    .pz-row.pz-total {
      background: var(--bg);
      font-weight: 800;
      font-size: 0.95rem;
      border-color: transparent;
    }

    .pz-row .pz-badge {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 800;
      margin-left: 8px;
      white-space: nowrap;
    }
    .badge-wrong   { background: var(--error);   color: #fff; }
    .badge-correct { background: var(--success); color: #000; }

    /* Diagnose-Hilfetexte */
    .diagnose-counter {
      font-size: 0.82rem;
      color: var(--text-dim);
      padding: 4px 12px;
      background: var(--surface2);
      border-radius: 99px;
      font-weight: 600;
    }

    /* =============================================================
       VERSTECKT
    ============================================================= */
    .hidden { display: none !important; }

    /* =============================================================
       RESPONSIVE
    ============================================================= */
    @media (max-width: 600px) {
      .wrapper { padding: 0 14px 48px; }
      .employee-grid { grid-template-columns: 1fr 1fr; }
      .tab-btn { padding: 9px 14px; font-size: 0.82rem; }
    }

    /* =============================================================
       BUCHUNGSSATZ-TABELLE (Schritt 7 & 8)
    ============================================================= */
    .buchung-block {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .buchung-head {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .buchung-num {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--info);
      color: #0f172a;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .buchung-title { font-weight: 800; font-size: 0.95rem; }
    .buchung-subtitle { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

    .buchung-body { padding: 18px 20px; }

    .buchung-desc {
      background: var(--surface2);
      border-left: 3px solid var(--info);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 14px;
      font-size: 0.83rem;
      color: var(--text-dim);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .buch-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .buch-table thead th {
      padding: 8px 12px;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .buch-table th.right,
    .buch-table td.right { text-align: right; }

    .buch-table tbody tr { transition: background 0.1s; }
    .buch-table tbody tr:hover { background: rgba(255,255,255,0.025); }

    .buch-table td {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(38,59,94,0.5);
      vertical-align: middle;
    }

    .buch-table tr:last-child td { border-bottom: none; }

    .konto-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 9px;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .soll-chip  { border-color: #f59e0b55; color: var(--accent); }
    .haben-chip { border-color: #10b98155; color: var(--success); }

    .buch-amount {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 0.88rem;
    }

    .buch-amount.soll  { color: var(--accent); }
    .buch-amount.haben { color: var(--success); }

    .buch-check {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .buch-check span { color: var(--success); font-weight: 700; }

    .buchung-badge {
      display: inline-block;
      background: var(--info-dim);
      border: 1px solid var(--info);
      color: var(--info);
      border-radius: 99px;
      padding: 3px 12px;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-left: auto;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- ============================================================
       HEADER
  ============================================================= -->
  <header>
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text">
        <h1>PV-<span>Paul</span></h1>
        <p>Der Personalverrechnungs-Trainer</p>
      </div>
    </div>
    <div class="points-badge" id="points-badge">
      <span class="icon">★</span>
      <span class="num" id="pts-num">0</span>
      <span class="label">Punkte</span>
    </div>
  </header>

  <!-- ============================================================
       MODUS-TABS
  ============================================================= -->
  <div class="tab-bar">

<script>
"use strict";

/* ============================================================

  },

  },
  dg_abgaben: {

      kv: 0.0378, pv: 0.1255, alv: 0.0300, wbf: 0.0050, uv: 0.0120,

    },

    dz:             0.0036,
    kommunalsteuer: 0.0300
  }
};

/* JSON laden – überschreibt D wenn erfolgreich */
fetch('daten_2026.json')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(json => { D = json; console.log(`✈️ PV-Paul: Daten ${D.year} geladen.`); })
  .catch(() => console.warn('daten_2026.json nicht gefunden – Standardwerte aktiv.'));

/* ============================================================
   2. STATE
============================================================ */
const STATE = {
  pts: 0,
  task: null,          // aktuelle Aufgabe (Rechentrainer)
  step: 0,             // aktueller Schritt (0-5)
  tries: [0,0,0,0,0,0],// Versuche pro Schritt
  solutionUsed: [false,false,false,false,false,false], // Lösung gezeigt → keine Punkte
  diag: null,          // Diagnosedaten
  diagSel: new Set()   // markierte Zeilen
};

/* ============================================================
   3. HILFSFUNKTIONEN
============================================================ */

/** Betrag auf 2 Dezimalstellen runden */
function rnd(n) { return Math.round(n * 100) / 100; }

/** Betrag als Währungsstring formatieren */
function fmt(n) {
  return n.toFixed(2).replace('.', ',') + '\u202f€';
}

/** Komma → Punkt für parseFloat */
function parseNum(s) { return parseFloat(String(s).replace(',', '.')); }

/** Punkte vergeben */
function givePoints(p) {
  if (p <= 0) return;
  STATE.pts += p;
  document.getElementById('pts-num').textContent = STATE.pts;
  const badge = document.getElementById('points-badge');
  badge.classList.remove('bump');
  void badge.offsetWidth; // Reflow für Animation-Reset
  badge.classList.add('bump');
}

/** Jährliche Lohnsteuer auf Basis Jahres-LSTBMGL berechnen */
function calcLSt(jahresBmgl) {
  const g = D.lohnsteuer.grenzen_jahr;
  const s = D.lohnsteuer.saetze;
  // Brackets: [[lower, upper, rate], ...]
  const brackets = [];
  for (let i = 1; i < s.length; i++) {
    brackets.push([g[i-1], i < g.length ? g[i] : Infinity, s[i]]);
  }
  let steuer = 0;
  for (const [low, high, rate] of brackets) {
    if (jahresBmgl <= low) break;
    steuer += (Math.min(jahresBmgl, high) - low) * rate;
  }
  return steuer;
}

/* ============================================================
   4. MODUS WECHSEL
============================================================ */
function switchMode(mode) {
  document.getElementById('view-trainer').classList.toggle('hidden', mode !== 'trainer');
  document.getElementById('view-diagnose').classList.toggle('hidden', mode !== 'diagnose');
  document.getElementById('tab-trainer').classList.toggle('active', mode === 'trainer');
  document.getElementById('tab-diagnose').classList.toggle('active', mode === 'diagnose');
  if (mode === 'diagnose' && !STATE.diag) genDiagnose();
  if (mode === 'trainer' && !STATE.task) genTask();
}

/* ============================================================
   5. RECHENTRAINER – AUFGABENGENERATOR
============================================================ */
const NAMES = [
  ['Anna','Müller','👩'], ['Thomas','Huber','👨'], ['Maria','Schneider','👩‍💼'],
  ['Michael','Wagner','🧑'], ['Sandra','Gruber','👩'], ['Peter','Bauer','👨‍💼'],
  ['Lisa','Steiner','👩'], ['Markus','Fischer','🧑‍💼'], ['Julia','Hofer','👩'],
  ['Andreas','Maier','👨'], ['Sabine','Wolf','👩‍💼'], ['Klaus','Berger','🧑']
];

// Pendlerpauschale-Optionen für Aufgabengenerator
function ppOptions() {
  return [
    null,
    { art:'Klein', strecke:'2-20km',   betrag: D.pendlerpauschale.klein['2-20km'] },
    { art:'Klein', strecke:'20-40km',  betrag: D.pendlerpauschale.klein['20-40km'] },
    { art:'Groß',  strecke:'2-20km',   betrag: D.pendlerpauschale.gross['2-20km'] },
    { art:'Groß',  strecke:'20-40km',  betrag: D.pendlerpauschale.gross['20-40km'] },
  ];
}

function genTask() {
  /* --- Zufallsdaten --- */
  const nr   = Math.floor(Math.random() * NAMES.length);
  const nm   = NAMES[nr];
  const grundgehalt  = rnd(Math.round((1800 + Math.random() * 2500) / 50) * 50);
  const uestunden    = Math.floor(Math.random() * 7);     // 0–6 Überstunden
  const kinder       = Math.floor(Math.random() * 3);     // 0–2 Kinder
  const hatGW        = Math.random() > 0.5;               // Gewerkschaft ja/nein
  const pp           = ppOptions()[Math.floor(Math.random() * ppOptions().length)];

  /* --- SCHRITT 1: Bruttobezug --- */
  // Stundenlohn: Grundgehalt ÷ 173 Normalstunden/Monat
  const stundenLohn    = grundgehalt / 173;
  const ueGrundlohn    = rnd(stundenLohn * 1.0 * uestunden);  // Grundlohn der ÜS (stpfl.)
  const ueZuschlag     = rnd(stundenLohn * 0.5 * uestunden);  // 50%-Zuschlag (§ 68 – ggf. stfrei)
  const ueVerg         = rnd(ueGrundlohn + ueZuschlag);       // Gesamt-ÜS-Vergütung

  // § 68 EStG: Steuerfreiheit des Zuschlags (max. 10 ÜS, max. 86 €/Monat)
  const par68          = D.par68 || { max_freie_uestunden: 10, max_freibetrag_monat: 86 };
  const freieUeStd     = Math.min(uestunden, par68.max_freie_uestunden);
  const ueZuschlagFrei = Math.min(rnd(stundenLohn * 0.5 * freieUeStd), par68.max_freibetrag_monat);
  // Steuerpflichtiger ÜS-Anteil = Grundlohn + nicht-steuerfreier Zuschlagsteil
  const ueSTPfl        = rnd(ueGrundlohn + (ueZuschlag - ueZuschlagFrei));

  const brutto      = rnd(grundgehalt + ueVerg);

  /* --- SCHRITT 2: SV-Abzug (DN-Anteil, auf vollem Brutto!) --- */
  // § 68: SV-Pflicht bleibt auf dem GESAMTEN Bruttobezug (inkl. steuerfreier Zuschlag)
  const svBemgl = Math.min(brutto, D.sv.hbgl_monatlich);
  const svAbzug = rnd(svBemgl * D.sv.gesamt);

  /* --- Gewerkschaftsbeitrag --- */
  const gwAbzug = hatGW ? rnd(brutto * D.gewerkschaftsbeitrag.prozent) : 0;

  /* --- Pendlerpauschale --- */
  const ppBetrag = pp ? pp.betrag : 0;

  /* --- SCHRITT 3: LSTBMGL (steuerfreier ÜS-Zuschlag wird herausgerechnet!) --- */
  // LSTBMGL = Brutto − steuerfreier ÜS-Zuschlag (§68) − SV-DN − PP − GW
  const lstbmgl = rnd(brutto - ueZuschlagFrei - svAbzug - ppBetrag - gwAbzug);

  /* --- SCHRITT 4: Lohnsteuer (vor Absetzbeträgen) --- */
  const jahresLst  = calcLSt(lstbmgl * 12);
  const monatLst   = rnd(jahresLst / 12);

  /* --- SCHRITT 5: Absetzbeträge & Netto-LSt --- */
  const verkehr    = rnd(D.absetzbetraege.verkehrsabsetzbetrag_jahr / 12);
  const famBonus   = rnd(kinder * D.absetzbetraege.familienbonus_u18_jahr / 12);
  const nettoLst   = Math.max(0, rnd(monatLst - verkehr - famBonus));

  /* --- SCHRITT 6: Nettoauszahlung --- */
  const netto = rnd(brutto - svAbzug - nettoLst - gwAbzug);

  /* --- SCHRITT 7 & 8: DG-Abgaben --- */
  const dg     = D.dg_abgaben;
  const svDgAb = rnd(svBemgl * dg.sv_dg.gesamt);
  const dbAb   = rnd(brutto * dg.db);
  const dzAb   = rnd(brutto * dg.dz);
  const kommAb = rnd(brutto * dg.kommunalsteuer);

  /* --- State speichern --- */
  STATE.task = {
    vorname: nm[0], nachname: nm[1], avatar: nm[2],
    grundgehalt, uestunden, ueVerg, stundenLohn: rnd(stundenLohn * 10000) / 10000,
    ueGrundlohn, ueZuschlag, ueZuschlagFrei, ueSTPfl, freieUeStd,
    kinder, hatGW, gwAbzug, pp, ppBetrag,
    brutto, svBemgl, svAbzug,
    lstbmgl, monatLst, verkehr, famBonus, nettoLst, netto,
    svDgAb, dbAb, dzAb, kommAb
  };
  STATE.step = 0;
  STATE.tries = [0,0,0,0,0,0];
  STATE.solutionUsed = [false,false,false,false,false,false];

  renderEmployee();
  renderSteps();
}

/* ============================================================
   6. MITARBEITERKARTE RENDERN
============================================================ */
function renderEmployee() {
  const t = STATE.task;

  document.getElementById('emp-name').textContent   = `${t.vorname} ${t.nachname}`;

    <div class="data-chip">
      <div class="chip-label">§ 68 steuerfrei</div>
      <div class="chip-value">${fmt(t.ueZuschlagFrei)}</div>
    </div>` : ''}
    <div class="data-chip">

    </div>
    <div class="data-chip">

    </div>

      <div class="chip-value normal">${t.hatGW ? 'Ja (1 % Brutto)' : 'Nein'}</div>
    </div>
    <div class="data-chip">
      <div class="chip-label">SV-Satz DN</div>
      <div class="chip-value">${(D.sv.gesamt * 100).toFixed(2)} %</div>
    </div>

}

/* ============================================================
   7. SCHRITT-DEFINITIONEN (gibt jeweils aktuellen Task zurück)
============================================================ */
function getSteps() {
  const t = STATE.task;
  const svPct = (D.sv.gesamt * 100).toFixed(2);

  // Lohnsteuer-Klassen (monatlich) für Beschreibungstext
  const g = D.lohnsteuer.grenzen_jahr;
  const s = D.lohnsteuer.saetze;
  const lstKlassen = s.slice(1).map((rate, i) => {
    const low  = (g[i]/12).toFixed(2).replace('.',',');
    const high = (i+1 < g.length-1) ? (g[i+1]/12).toFixed(2).replace('.',',') : '–';
    return `bis ${high}\u202f€: ${(rate*100).toFixed(0)}%`;
  }).slice(0,4).join(' | ');

  return [
    /* ── Schritt 1: Bruttobezug ── */
    {
      title: 'Schritt 1 – Bruttobezug',
      field: 'Bruttobezug (€)',
      correct: t.brutto,
      desc: t.uestunden > 0
        ? `Berechne den Bruttobezug = Grundgehalt + gesamte Überstundenvergütung.\n`
          + `Stundenlohn = ${fmt(t.grundgehalt)} ÷ 173 = ${t.stundenLohn.toFixed(4).replace('.',',')} €/Std.\n`
          + `ÜS-Grundlohn: ${t.uestunden} × ${t.stundenLohn.toFixed(4).replace('.',',')} €  = ${fmt(t.ueGrundlohn)}\n`
          + `ÜS-Zuschlag (50%): ${t.uestunden} × ${t.stundenLohn.toFixed(4).replace('.',',')} € × 0,5 = ${fmt(t.ueZuschlag)}\n`
          + `⚠️ § 68 EStG: Der Zuschlag der ersten ${t.freieUeStd} ÜS ist steuerfrei (${fmt(t.ueZuschlagFrei)}) – aber erst ab Schritt 3! Im Bruttobezug steht ALLES.`
        : `Dieser Monat gibt es keine Überstunden. Der Bruttobezug entspricht dem Grundgehalt: ${fmt(t.grundgehalt)}.`,
      hints: [
        `Bruttobezug = Grundgehalt + ÜS-Grundlohn + ÜS-Zuschlag (der steuerfreie Anteil kommt erst in Schritt 3 heraus!).`,
        `${fmt(t.grundgehalt)} + ${fmt(t.ueGrundlohn)} + ${fmt(t.ueZuschlag)} = ?`,
        `✅ Ergebnis: ${fmt(t.grundgehalt)} + ${fmt(t.ueVerg)} = ${fmt(t.brutto)}`
      ]
    },
    /* ── Schritt 2: SV-Abzug ── */
    {
      title: 'Schritt 2 – SV-Abzug (Dienstnehmeranteil)',
      field: 'SV-Abzug (€)',
      correct: t.svAbzug,
      desc: `SV-Satz DN gesamt: ${svPct}% (KV ${(D.sv.kv*100).toFixed(2)}% + PV ${(D.sv.pv*100).toFixed(2)}% + ALV ${(D.sv.alv*100).toFixed(2)}% + WBF ${(D.sv.wbf*100).toFixed(2)}%)\n`
          + `Höchstbeitragsgrundlage: ${fmt(D.sv.hbgl_monatlich)}/Monat\n`
          + `SV-Beitrag = SV-Bemessungsgrundlage × ${svPct}%`,
      hints: [
        `Prüfe: Ist der Bruttobezug (${fmt(t.brutto)}) unter der Höchstbeitragsgrundlage (${fmt(D.sv.hbgl_monatlich)})?`,
        `SV-Bemessungsgrundlage = ${fmt(t.svBemgl)} (da Brutto ${t.brutto <= D.sv.hbgl_monatlich ? 'unter' : 'über'} HBGL)`,
        `✅ Ergebnis: ${fmt(t.svBemgl)} × ${svPct}% = ${fmt(t.svAbzug)}`
      ]
    },
    /* ── Schritt 3: LSTBMGL ── */
    {
      title: 'Schritt 3 – Lohnsteuer-Bemessungsgrundlage',
      field: 'LSTBMGL (€)',
      correct: t.lstbmgl,
      desc: `LSTBMGL = Bruttobezug`
          + (t.ueZuschlagFrei > 0 ? ` − steuerfreier ÜS-Zuschlag (§ 68)` : '')
          + ` − SV-DN-Anteil`
          + (t.ppBetrag > 0 ? ` − Pendlerpauschale` : '')
          + (t.hatGW       ? ` − Gewerkschaftsbeitrag` : '')
          + `\n= ${fmt(t.brutto)}`
          + (t.ueZuschlagFrei > 0 ? ` − ${fmt(t.ueZuschlagFrei)}` : '')
          + ` − ${fmt(t.svAbzug)}`
          + (t.ppBetrag > 0 ? ` − ${fmt(t.ppBetrag)}` : '')
          + (t.hatGW       ? ` − ${fmt(t.gwAbzug)}` : '')
          + (t.ueZuschlagFrei > 0 ? `\n⚠️ § 68 EStG: Der steuerfreie Zuschlag (${fmt(t.ueZuschlagFrei)}) wird erst hier – bei der LSTBMGL – abgezogen, NICHT schon beim Bruttobezug!` : ''),
      hints: [
        `Abzüge: SV-DN (${fmt(t.svAbzug)})`
          + (t.ueZuschlagFrei > 0 ? `, steuerfreier ÜS-Zuschlag § 68 (${fmt(t.ueZuschlagFrei)})` : '')
          + (t.ppBetrag > 0 ? `, PP (${fmt(t.ppBetrag)})` : '')
          + (t.hatGW ? `, GW (${fmt(t.gwAbzug)})` : ''),
        t.ueZuschlagFrei > 0
          ? `§ 68: Die ersten ${t.freieUeStd} ÜS-Zuschläge (= ${fmt(t.ueZuschlagFrei)}) sind steuerfrei. Aber: SV wurde trotzdem auf das volle Brutto berechnet!`
          : `Vergiss nicht: Pendlerpauschale und Gewerkschaftsbeitrag verringern die LSTBMGL.`,
        `✅ Ergebnis: ${fmt(t.brutto)}`
          + (t.ueZuschlagFrei > 0 ? ` − ${fmt(t.ueZuschlagFrei)}` : '')
          + ` − ${fmt(t.svAbzug)}`
          + (t.ppBetrag > 0 ? ` − ${fmt(t.ppBetrag)}` : '')
          + (t.hatGW ? ` − ${fmt(t.gwAbzug)}` : '')
          + ` = ${fmt(t.lstbmgl)}`
      ]
    },
    /* ── Schritt 4: Lohnsteuer (vor Absetzbeträgen) ── */
    {
      title: 'Schritt 4 – Lohnsteuer (vor Absetzbeträgen)',
      field: 'Monats-Lohnsteuer (€)',
      correct: t.monatLst,
      desc: `Berechne die monatliche Lohnsteuer:\n`
          + `1) LSTBMGL monatlich × 12 = Jahres-LSTBMGL\n`
          + `2) Progressive Steuertabelle anwenden → Jahressteuer\n`
          + `3) Jahressteuer ÷ 12 = Monatliche Lohnsteuer (vor Absetzbeträgen)\n\n`
          + `Steuersätze: ${lstKlassen}`,
      hints: [
        `Jahres-LSTBMGL: ${fmt(t.lstbmgl)} × 12 = ${fmt(t.lstbmgl * 12)}. Wende die Steuertabelle an.`,
        `Jahressteuer ÷ 12 ergibt die monatliche Brutto-Lohnsteuer.`,
        `✅ Ergebnis: Monatliche Lohnsteuer (vor Absetzbeträgen) = ${fmt(t.monatLst)}`
      ]
    },
    /* ── Schritt 5: Absetzbeträge & Netto-LSt ── */
    {
      title: 'Schritt 5 – Netto-Lohnsteuer (nach Absetzbeträgen)',
      field: 'Netto-Lohnsteuer (€)',
      correct: t.nettoLst,
      desc: `Absetzbeträge werden direkt von der Lohnsteuer abgezogen:\n`
          + `• Verkehrsabsetzbetrag: ${fmt(t.verkehr)}/Monat\n`
          + (t.kinder > 0 ? `• Familienbonus Plus (${t.kinder} Kind${t.kinder>1?'er':''}): ${fmt(t.famBonus)}/Monat\n` : '')
          + `\nNetto-LSt = Brutto-LSt − Absetzbeträge ≥ 0`,
      hints: [
        `Netto-LSt = ${fmt(t.monatLst)} − ${fmt(t.verkehr)} (Verkehrsabsetzbetrag)` + (t.kinder>0?` − ${fmt(t.famBonus)} (Familienbonus)`:''),
        `Das Ergebnis kann nicht negativ sein! Minimum = 0,00 €.`,
        `✅ Ergebnis: ${fmt(t.monatLst)} − ${fmt(t.verkehr)}` + (t.kinder>0?` − ${fmt(t.famBonus)}`:'') + ` = ${fmt(t.nettoLst)}`
      ]
    },
    /* ── Schritt 6: Nettoauszahlung ── */
    {
      title: 'Schritt 6 – Nettoauszahlungsbetrag',
      field: 'Netto (€)',
      correct: t.netto,
      desc: `Netto = Bruttobezug − SV-DN-Anteil − Netto-Lohnsteuer`
          + (t.hatGW ? ` − Gewerkschaftsbeitrag` : '')
          + `\n${fmt(t.brutto)} − ${fmt(t.svAbzug)} − ${fmt(t.nettoLst)}`
          + (t.hatGW ? ` − ${fmt(t.gwAbzug)}` : ''),
      hints: [
        `Netto = Brutto − alle Abzüge. Prüfe, ob du SV, Lohnsteuer${t.hatGW?' und Gewerkschaftsbeitrag':''} berücksichtigt hast.`,
        `Abzüge: SV (${fmt(t.svAbzug)}), LSt (${fmt(t.nettoLst)})` + (t.hatGW ? `, GW (${fmt(t.gwAbzug)})` : ''),
        `✅ Ergebnis: ${fmt(t.brutto)} − ${fmt(t.svAbzug)} − ${fmt(t.nettoLst)}` + (t.hatGW?` − ${fmt(t.gwAbzug)}`:'') + ` = ${fmt(t.netto)}`
      ]
    }
  ];
}

/* ============================================================
   8. SCHRITTE RENDERN
============================================================ */
function renderSteps() {
  const steps  = getSteps();
  const wrap   = document.getElementById('steps-wrap');
  wrap.innerHTML = '';

  steps.forEach((s, i) => {
    const isDone   = i < STATE.step;
    const isActive = i === STATE.step;
    const isLocked = i > STATE.step;
    const tries    = STATE.tries[i];

    const el = document.createElement('div');
    el.className = `step ${isDone ? 'done' : ''} ${isActive ? 'active' : ''} ${isLocked ? 'locked' : ''}`;
    el.id = `step-${i}`;

    // Versuchsdots
    const dots = [0,1,2].map(j =>
      `<div class="dot ${j < tries ? 'used' : ''}"></div>`).join('');

    el.innerHTML = `
      <div class="step-head">
        <div class="step-num">${isDone ? '✓' : i+1}</div>
        <div class="step-head-info">
          <div class="step-title">${s.title}</div>
        </div>
        ${isDone
          ? `<span class="step-result-value">✓ ${fmt(s.correct)}</span>`
          : isActive
            ? `<div class="attempt-dots">${dots}</div>`
            : ''}
      </div>
      ${isActive ? `
      <div class="step-body">
        <div class="step-desc">${s.desc.replace(/\n/g,'<br>')}</div>
        <div class="input-row">
          <span class="input-label">${s.field}:</span>
          <input type="number" step="0.01" placeholder="0,00" id="inp-${i}"
                 onkeydown="if(event.key==='Enter') checkStep(${i})">
          <span class="input-unit">€</span>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary"   onclick="checkStep(${i})">✅ Prüfen</button>
          <button class="btn btn-secondary" onclick="giveHint(${i})">💡 Hinweis</button>
          <button class="btn btn-ghost"     onclick="giveSolution(${i})">👁 Lösung</button>
        </div>
        <div id="fb-${i}" class="feedback"></div>
      </div>` : ''}
    `;

    wrap.appendChild(el);
  });

  // Buchungen und Abschluss wenn alle 6 Rechenschritte fertig
  if (STATE.step >= 6) {
    wrap.appendChild(renderBuchungLohn());
    wrap.appendChild(renderBuchungDG());
    const done = document.createElement('div');
    done.className = 'completion-card';
    done.innerHTML = `
      <div class="big-emoji">🎉</div>
      <h3>Abrechnung vollständig berechnet!</h3>
      <p>Nettoauszahlungsbetrag für ${STATE.task.vorname} ${STATE.task.nachname}:</p>
      <div class="net-amount">${fmt(STATE.task.netto)}</div>
      <p style="margin-bottom:16px">Super gemacht! Dein Punktestand: <strong>${STATE.pts}</strong> Punkte</p>
      <button class="btn btn-green" onclick="genTask()">🎲 Neue Aufgabe starten</button>
    `;
    wrap.appendChild(done);
  }

  // Fortschrittsbalken (6 Rechenschritte = 100%)
  document.getElementById('prog-fill').style.width = `${Math.min(100, (STATE.step / 6) * 100)}%`;

  // Fokus auf aktives Eingabefeld
  setTimeout(() => {
    const inp = document.getElementById(`inp-${STATE.step}`);
    if (inp) inp.focus();
  }, 80);
}

/* ============================================================
   9. SCHRITT PRÜFEN
============================================================ */
function checkStep(idx) {
  const steps   = getSteps();
  const def     = steps[idx];
  const inp     = document.getElementById(`inp-${idx}`);
  const fbEl    = document.getElementById(`fb-${idx}`);
  const val     = parseNum(inp.value);

  if (isNaN(val)) {
    showFb(fbEl, 'f-hint', '⚠️ Bitte gib einen Zahlenwert ein.');
    return;
  }

  // Toleranz ±0,05 € (Rundungsunterschiede)
  if (Math.abs(val - def.correct) <= 0.05) {
    inp.className = 'inp-correct';
    const pts = STATE.solutionUsed[idx] ? 0 : Math.max(1, 3 - STATE.tries[idx]);
    if (pts > 0) givePoints(pts);
    const ptsMsg = pts > 0 ? ` +${pts} Punkt${pts !== 1 ? 'e' : ''}` : ' (keine Punkte – Lösung wurde verwendet)';
    showFb(fbEl, 'f-ok', `✅ Richtig!${ptsMsg}. ${fmt(def.correct)} ist korrekt.`);
    STATE.step = idx + 1;
    setTimeout(renderSteps, 1100);
  } else {
    inp.className = 'inp-wrong';
    STATE.tries[idx]++;

    if (STATE.tries[idx] >= 3) {
      showFb(fbEl, 'f-hint',
        `❌ Noch nicht richtig. Du hast alle 3 Versuche genutzt – klicke auf „Lösung" für die Antwort.`);
    } else {
      // Gestufter Hinweis je Versuch
      const hintIdx = Math.min(STATE.tries[idx] - 1, def.hints.length - 2);
      showFb(fbEl, 'f-hint', `💡 ${def.hints[hintIdx]}`);
    }
    renderSteps(); // Versuchsdots aktualisieren
    setTimeout(() => { const i2 = document.getElementById(`inp-${idx}`); if(i2) i2.focus(); }, 80);
  }
}

function giveHint(idx) {
  const def   = getSteps()[idx];
  const fbEl  = document.getElementById(`fb-${idx}`);
  const hintIdx = Math.min(STATE.tries[idx], def.hints.length - 2);
  showFb(fbEl, 'f-hint', `💡 ${def.hints[Math.max(0, hintIdx)]}`);
}

function giveSolution(idx) {
  const def  = getSteps()[idx];
  const fbEl = document.getElementById('fb-' + idx);
  STATE.solutionUsed[idx] = true; // Lösung angezeigt → keine Punkte mehr für diesen Schritt
  showFb(fbEl, 'f-sol', '📖 ' + def.hints[def.hints.length - 1]);
}

function showFb(el, cls, html) {
  el.className = `feedback ${cls} show`;
  el.innerHTML = html;
}

/* ============================================================
   10. FEHLERDIAGNOSE – AUFGABENGENERATOR
============================================================ */

/**
 * Definiert mögliche Fehlertypen mit Erklärungs- und Generierungslogik.
 * Jeder Eintrag: { id, rowId, label, errLabel, explain, inject(task) → wrongValue }
 */
function errorTypes(t) {
  return [
    {
      id: 'sv_satz',
      rowId: 'sv',
      label: 'SV-Abzug (DN-Anteil)',
      errLabel: 'Falscher SV-Satz',
      explain: `Falscher SV-Satz: Es wurden ${((D.sv.gesamt + 0.05)*100).toFixed(2)}% statt der korrekten ${(D.sv.gesamt*100).toFixed(2)}% verwendet.`,
      inject: () => rnd(t.svBemgl * (D.sv.gesamt + 0.05))
    },
    {
      id: 'sv_hbgl',
      rowId: 'sv',
      label: 'SV-Abzug (DN-Anteil)',
      errLabel: 'HBGL ignoriert',
      explain: `Die Höchstbeitragsgrundlage (${fmt(D.sv.hbgl_monatlich)}) wurde nicht berücksichtigt – Berechnung mit vollem Brutto.`,
      inject: () => rnd(t.brutto * D.sv.gesamt * 1.08) // künstlich höher
    },
    {
      id: 'par68_vergessen',
      rowId: 'par68',
      label: `§ 68 – steuerfr. ÜS-Zuschlag`,
      errLabel: '§ 68 fehlt in LSTBMGL',
      explain: `Der steuerfreie ÜS-Zuschlag nach § 68 EStG (${fmt(t.ueZuschlagFrei)}) wurde nicht von der Lohnsteuerbemessungsgrundlage abgezogen – die LSTBMGL ist dadurch zu hoch.`,
      inject: () => rnd(-(t.ueZuschlagFrei * 0)) // zeigt 0,00 € statt korrektem Betrag
    },
    {
      id: 'pp_falsch',
      rowId: 'pp',
      label: 'Pendlerpauschale',
      errLabel: 'Falscher PP-Betrag',
      explain: `Falscher Pendlerpauschale-Betrag: Es wurde der doppelte Monatsbetrag abgezogen.`,
      inject: () => t.ppBetrag * 2
    },
    {
      id: 'lstbmgl_sv',
      rowId: 'lstbmgl',
      label: 'LSTBMGL',
      errLabel: 'SV-Abzug fehlt',
      explain: `Der SV-Abzug (${fmt(t.svAbzug)}) wurde bei der LSTBMGL nicht abgezogen.`,
      inject: () => rnd(t.lstbmgl + t.svAbzug)
    },
    {
      id: 'lst_kein_ab',
      rowId: 'netto_lst',
      label: 'Netto-Lohnsteuer',
      errLabel: 'Absetzbeträge fehlen',
      explain: `Die Absetzbeträge (Verkehrsabsetzbetrag ${fmt(t.verkehr)}${t.kinder>0?', Familienbonus '+fmt(t.famBonus):''}) wurden nicht von der Lohnsteuer abgezogen.`,
      inject: () => t.monatLst  // keine Absetzbeträge abgezogen
    },
    {
      id: 'fb_halb',
      rowId: 'netto_lst',
      label: 'Netto-Lohnsteuer',
      errLabel: 'Familienbonus halbiert',
      explain: `Der Familienbonus Plus (${fmt(t.famBonus)}) wurde nur zur Hälfte abgezogen.`,
      inject: () => Math.max(0, rnd(t.monatLst - t.verkehr - t.famBonus/2))
    },
    {
      id: 'netto_gw',
      rowId: 'netto',
      label: 'Nettoauszahlung',
      errLabel: 'Gewerkschaft vergessen',
      explain: `Der Gewerkschaftsbeitrag (${fmt(t.gwAbzug)}) wurde bei der Nettoberechnung nicht abgezogen.`,
      inject: () => rnd(t.netto + t.gwAbzug)
    },
    {
      id: 'netto_falsch',
      rowId: 'netto',
      label: 'Nettoauszahlung',
      errLabel: 'Rechenfehler Netto',
      explain: `Die Lohnsteuer wurde doppelt abgezogen – Rechenfehler bei der Netto-Ermittlung.`,
      inject: () => rnd(t.netto - t.nettoLst)
    }
  ];
}

function genDiagnose() {
  /* Basis-Aufgabe generieren – identische Berechnungslogik wie Rechentrainer (inkl. § 68) */
  const nr = Math.floor(Math.random() * NAMES.length);
  const nm = NAMES[nr];
  const grundgehalt = rnd(Math.round((2000 + Math.random() * 1800) / 50) * 50);
  const uestunden   = Math.floor(Math.random() * 5);   // 0–4 Überstunden
  const kinder      = Math.floor(Math.random() * 3);
  const hatGW       = Math.random() > 0.5;
  const ppOpts      = ppOptions().filter(Boolean);
  const pp          = ppOpts[Math.floor(Math.random() * ppOpts.length)];

  // ÜS-Berechnung mit § 68 (gleiche Logik wie genTask)
  const stundenLohn    = grundgehalt / 173;
  const ueGrundlohn    = rnd(stundenLohn * 1.0 * uestunden);
  const ueZuschlag     = rnd(stundenLohn * 0.5 * uestunden);
  const ueVerg         = rnd(ueGrundlohn + ueZuschlag);
  const par68          = D.par68 || { max_freie_uestunden: 10, max_freibetrag_monat: 86 };
  const freieUeStd     = Math.min(uestunden, par68.max_freie_uestunden);
  const ueZuschlagFrei = Math.min(rnd(stundenLohn * 0.5 * freieUeStd), par68.max_freibetrag_monat);
  const brutto         = rnd(grundgehalt + ueVerg);

  // SV auf vollem Brutto (§ 68: SV-Pflicht bleibt!)
  const svBemgl  = Math.min(brutto, D.sv.hbgl_monatlich);
  const svAbzug  = rnd(svBemgl * D.sv.gesamt);
  const gwAbzug  = hatGW ? rnd(brutto * D.gewerkschaftsbeitrag.prozent) : 0;
  const ppBetrag = pp.betrag;

  // LSTBMGL: steuerfreier ÜS-Zuschlag wird herausgerechnet
  const lstbmgl  = rnd(brutto - ueZuschlagFrei - svAbzug - ppBetrag - gwAbzug);
  const monatLst = rnd(calcLSt(lstbmgl * 12) / 12);
  const verkehr  = rnd(D.absetzbetraege.verkehrsabsetzbetrag_jahr / 12);
  const famBonus = rnd(kinder * D.absetzbetraege.familienbonus_u18_jahr / 12);
  const nettoLst = Math.max(0, rnd(monatLst - verkehr - famBonus));
  const netto    = rnd(brutto - svAbzug - nettoLst - gwAbzug);

  const baseTask = {
    vorname: nm[0], nachname: nm[1], avatar: nm[2],
    grundgehalt, uestunden, ueVerg, ueGrundlohn, ueZuschlag, ueZuschlagFrei, freieUeStd,
    kinder, hatGW, gwAbzug, pp, ppBetrag,
    brutto, svBemgl, svAbzug, lstbmgl,
    monatLst, verkehr, famBonus, nettoLst, netto
  };

  /* Fehler auswählen (2–3 Fehler aus passenden Typen) */
  let pool = errorTypes(baseTask).filter(e => {
    if (e.id === 'fb_halb' && kinder === 0) return false;
    if (e.id === 'netto_gw' && !hatGW) return false;
    if (e.id === 'par68_vergessen' && ueZuschlagFrei === 0) return false;
    return true;
  });
  // Mische und nimm 2–3
  pool = pool.sort(() => Math.random() - 0.5);
  const numErr = 2 + Math.floor(Math.random() * 2);

  // Pro rowId nur 1 Fehler erlauben
  const usedRows = new Set();
  const chosen   = [];
  for (const e of pool) {
    if (usedRows.has(e.rowId)) continue;
    chosen.push(e);
    usedRows.add(e.rowId);
    if (chosen.length >= numErr) break;
  }

  // Richtige Werte (für Anzeige) mit Fehlern überschreiben
  const rows = [
    { id: 'brutto',   label: `Bruttobezug${uestunden > 0 ? ` (inkl. ${uestunden} ÜS)` : ''}`, val: brutto, isErr: false },
    { id: 'sv',       label: `SV-Abzug DN (${(D.sv.gesamt*100).toFixed(2)}%, auf Brutto)`, val: svAbzug, isErr: false },
    ...(ueZuschlagFrei > 0 ? [{ id: 'par68', label: `§ 68 – steuerfr. ÜS-Zuschlag (${freieUeStd} ÜS)`, val: -ueZuschlagFrei, isErr: false }] : []),
    { id: 'pp',       label: `Pendlerpauschale (${pp.art}, ${pp.strecke})`,    val: -ppBetrag, isErr: false },
    { id: 'gw',       label: 'Gewerkschaftsbeitrag (1%)',           val: hatGW ? -gwAbzug : null, isErr: false },
    { id: 'lstbmgl',  label: 'Lohnsteuer-Bemessungsgrundlage',      val: lstbmgl,               isErr: false },
    { id: 'netto_lst',label: 'Lohnsteuer (nach Absetzbeträgen)',    val: nettoLst,              isErr: false },
    { id: 'netto',    label: 'Nettoauszahlungsbetrag',              val: netto,                 isErr: false, isTotal: true }
  ];

  const errRowIds   = new Set();
  const explanations = [];

  chosen.forEach(e => {
    const row = rows.find(r => r.id === e.rowId);
    if (!row) return;
    const wrongVal = e.inject();
    // PP und GW werden negativ angezeigt
    row.val    = (e.rowId === 'pp' || e.rowId === 'gw') ? -Math.abs(wrongVal) : wrongVal;
    row.isErr  = true;
    errRowIds.add(e.rowId);
    explanations.push({ rowId: e.rowId, text: e.explain, label: e.errLabel });
  });

  // GW-Zeile entfernen wenn kein GW
  const displayRows = rows.filter(r => !(r.id === 'gw' && r.val === null));

  STATE.diag    = { task: baseTask, rows: displayRows, errRowIds, explanations };
  STATE.diagSel = new Set();

  renderDiagnose();
}

============================================================ */

      }).join('')}

  // Feedback zurücksetzen
  const fb = document.getElementById('diag-feedback');
  fb.className = 'feedback';
  fb.textContent = '';

function toggleDiagSel(rowId) {
  if (STATE.diagSel.has(rowId)) {
    STATE.diagSel.delete(rowId);
    document.getElementById(`pzr-${rowId}`).classList.remove('selected');
  } else {
    STATE.diagSel.add(rowId);
    document.getElementById(`pzr-${rowId}`).classList.add('selected');
  }
  document.getElementById('diag-counter').textContent =
    `${STATE.diagSel.size} / ${STATE.diag.errRowIds.size} markiert`;
}

/* ============================================================
   12. FEHLERDIAGNOSE – PRÜFEN / HINWEIS / LÖSUNG
============================================================ */
function checkDiagnose() {
  const { errRowIds, explanations } = STATE.diag;
  const sel     = STATE.diagSel;
  const correct = [...sel].filter(id => errRowIds.has(id));
  const wrong   = [...sel].filter(id => !errRowIds.has(id));
  const missed  = [...errRowIds].filter(id => !sel.has(id));
  const fb      = document.getElementById('diag-feedback');

  // Punkte: 2 pro richtig gefundenem Fehler, +2 Bonus wenn alle vollständig
  const pts = correct.length * 2 + (missed.length === 0 && wrong.length === 0 ? 2 : 0);
  if (pts > 0) givePoints(pts);

  // Fehler im Lohnzettel farblich markieren
  STATE.diag.rows.forEach(r => {
    const el = document.getElementById(`pzr-${r.id}`);
    if (!el) return;
    el.classList.remove('selected');
    if (r.isErr)           el.classList.add('revealed-error');
    else if (sel.has(r.id)) el.classList.add('revealed-correct'); // fälschlich markiert – grün wäre verwirrend, also nichts extra
  });

  let msg = '';
  if (missed.length === 0 && wrong.length === 0) {
    msg = `🎉 Perfekt! Alle ${errRowIds.size} Fehler gefunden! +${pts} Punkte!`;
    showFb(fb, 'f-ok', msg);
  } else {
    if (correct.length > 0) msg += `✅ ${correct.length} Fehler richtig erkannt (+${correct.length*2} Punkte). `;
    if (wrong.length > 0)   msg += `⚠️ ${wrong.length} Zeile${wrong.length>1?'n':''} fälschlicherweise markiert. `;
    if (missed.length > 0)  msg += `❌ ${missed.length} Fehler noch nicht gefunden.`;
    showFb(fb, 'f-hint', msg);
  }
}

function hintDiagnose() {
  const { errRowIds } = STATE.diag;
  const missed = [...errRowIds].filter(id => !STATE.diagSel.has(id));
  const fb     = document.getElementById('diag-feedback');

  if (missed.length === 0) {
    showFb(fb, 'f-ok', '✅ Du hast bereits alle Fehler markiert!');
    return;
  }

  const hints = [
    'Schau dir die Sozialversicherungsberechnung genau an.',
    'Prüfe, ob alle Abzüge korrekt bei der Lohnsteuer-Bemessungsgrundlage berücksichtigt wurden.',
    'Kontrolliere die Absetzbeträge bei der Lohnsteuer (Verkehrsabsetzbetrag, Familienbonus).',
    'Stimmt der Nettoauszahlungsbetrag mit der Summe der Abzüge überein?',
    'Überprüfe, ob der Pendlerpauschale-Betrag mit dem angegebenen Streckentyp übereinstimmt.'
  ];

  showFb(fb, 'f-hint', `💡 Tipp: ${hints[Math.floor(Math.random() * hints.length)]}`);
}

function solDiagnose() {
  const { explanations, rows } = STATE.diag;
  const fb = document.getElementById('diag-feedback');

  // Alle Fehler im Lohnzettel anzeigen
  rows.forEach(r => {
    const el = document.getElementById(`pzr-${r.id}`);
    if (!el) return;
    if (r.isErr) {
      el.classList.remove('selected');
      el.classList.add('revealed-error');
      // Badge hinzufügen
      if (!el.querySelector('.pz-badge')) {
        const b = document.createElement('span');
        b.className = 'pz-badge badge-wrong';
        b.textContent = '✗ Fehler';
        el.appendChild(b);
      }
    }
  });

  const expHtml = explanations.map(e =>
    `<strong>${e.label}:</strong> ${e.text}`).join('<br><br>');
  showFb(fb, 'f-sol', `📖 <strong>Lösung:</strong><br><br>${expHtml}`);
}


/* ============================================================
   12b. BUCHUNGSSATZ – VERBUCHUNG LOHN/GEHALT
   Zeigt die Journalbuchung für Lohn/Gehalt nach Schritt 6
============================================================ */

  const dg  = D.dg_abgaben;
  const el  = document.createElement('div');
  el.className = 'buchung-block';

  const habenRows = [

    { konto: '3610', name: 'SV-Verbindlichkeit (DN-Anteil)',  betrag: t.svAbzug },
    { konto: '3600', name: 'Lohnsteuerverbindlichkeit',       betrag: t.nettoLst },
  ];
  if (t.hatGW) {
    habenRows.push({ konto: '3580', name: 'Gewerkschaftsbeitr.-Verbindl.', betrag: t.gwAbzug });
  }

  const sollSumme  = t.brutto;
  const habenSumme = habenRows.reduce((s, r) => s + r.betrag, 0);

  el.innerHTML = `
    <div class="buchung-head">
      <div class="buchung-num">7</div>
      <div>
        <div class="buchung-title">Verbuchung Lohn/Gehalt</div>
        <div class="buchung-subtitle">Buchungssatz für den Personalaufwand dieses Monats</div>
      </div>
      <div class="buchung-badge">Buchung 1 von 2</div>
    </div>
    <div class="buchung-body">
      <div class="buchung-desc">
        Der <strong>Bruttobezug</strong> wird als Aufwand verbucht (SOLL). Auf der Habenseite stehen alle
        Verbindlichkeiten: Nettolohn an den Mitarbeiter, SV-Anteil und Lohnsteuer ans Finanzamt.
      </div>
      <table class="buch-table">
        <thead>
          <tr>
            <th>Konto</th>
            <th>Bezeichnung</th>
            <th class="right">SOLL</th>
            <th class="right">HABEN</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="konto-chip soll-chip">6000</span></td>
            <td>Personalaufwand (Gehalt/Lohn)</td>
            <td class="right"><span class="buch-amount soll">${fmt(sollSumme)}</span></td>
            <td></td>
          </tr>
          ${habenRows.map(r => `
          <tr>
            <td><span class="konto-chip haben-chip">${r.konto}</span></td>
            <td>${r.name}</td>
            <td></td>
            <td class="right"><span class="buch-amount haben">${fmt(r.betrag)}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="buch-check">
        Summe SOLL: <span>${fmt(sollSumme)}</span> &nbsp;|&nbsp;
        Summe HABEN: <span>${fmt(rnd(habenSumme))}</span>
        ${Math.abs(sollSumme - habenSumme) < 0.03 ? ' &nbsp;✓ ausgeglichen' : ''}
      </div>
    </div>
  `;
  return el;
}

/* ============================================================
   12c. BUCHUNGSSATZ – VERBUCHUNG DG-ABGABEN
   Zeigt die Journalbuchung für lohnabhängige DG-Abgaben
============================================================ */
function renderBuchungDG() {
  const t  = STATE.task;
  const dg = D.dg_abgaben;
  const el = document.createElement('div');
  el.className = 'buchung-block';

  const sollRows = [
    { konto: '6020', name: `SV-Aufwand DG (${(dg.sv_dg.gesamt*100).toFixed(2)}%)`,  betrag: t.svDgAb },
    { konto: '6040', name: `DB-Aufwand (${(dg.db*100).toFixed(2)}%)`,                betrag: t.dbAb   },
    { konto: '6041', name: `DZ-Aufwand (${(dg.dz*100).toFixed(2)}%)`,                betrag: t.dzAb   },
    { konto: '6050', name: `Kommunalsteuer-Aufwand (${(dg.kommunalsteuer*100).toFixed(2)}%)`, betrag: t.kommAb },
  ];
  const habenRows = [
    { konto: '3610', name: 'SV-Verbindlichkeit (DG-Anteil)',  betrag: t.svDgAb },
    { konto: '3640', name: 'DB-Verbindlichkeit',              betrag: t.dbAb   },
    { konto: '3641', name: 'DZ-Verbindlichkeit',              betrag: t.dzAb   },
    { konto: '3650', name: 'KommSt-Verbindlichkeit',          betrag: t.kommAb },
  ];

  const gesamtAufwand = rnd(sollRows.reduce((s,r) => s + r.betrag, 0));

  el.innerHTML = `
    <div class="buchung-head">
      <div class="buchung-num">8</div>
      <div>
        <div class="buchung-title">Verbuchung lohn-/gehaltsabhängige Abgaben (DG-Anteile)</div>
        <div class="buchung-subtitle">DB, DZ, Kommunalsteuer und SV-Dienstgeberanteil</div>
      </div>
      <div class="buchung-badge">Buchung 2 von 2</div>
    </div>
    <div class="buchung-body">
      <div class="buchung-desc">
        Der Dienstgeber (= das Unternehmen) trägt zusätzliche Abgaben, die nicht vom Gehalt abgezogen werden,
        sondern <strong>eigener Aufwand</strong> des Unternehmens sind:
        SV-DG-Anteil, Dienstgeberbeitrag (DB), Zuschlag zum DB (DZ) und Kommunalsteuer (KommSt).
      </div>
      <table class="buch-table">
        <thead>
          <tr>
            <th>Konto</th>
            <th>Bezeichnung</th>
            <th class="right">SOLL</th>
            <th class="right">HABEN</th>
          </tr>
        </thead>
        <tbody>
          ${sollRows.map(r => `
          <tr>
            <td><span class="konto-chip soll-chip">${r.konto}</span></td>
            <td>${r.name}</td>
            <td class="right"><span class="buch-amount soll">${fmt(r.betrag)}</span></td>
            <td></td>
          </tr>`).join('')}
          ${habenRows.map(r => `
          <tr>
            <td><span class="konto-chip haben-chip">${r.konto}</span></td>
            <td>${r.name}</td>
            <td></td>
            <td class="right"><span class="buch-amount haben">${fmt(r.betrag)}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="buch-check">
        Gesamtaufwand DG-Abgaben: <span>${fmt(gesamtAufwand)}</span> &nbsp;|&nbsp;
        Brutto: <span>${fmt(t.brutto)}</span> &nbsp;|&nbsp;
        Gesamtkosten: <span>${fmt(rnd(t.brutto + gesamtAufwand))}</span>
      </div>
    </div>
  `;
  return el;
}
